<!DOCTYPE html>
<html>
<head>
  <title>NIfTI Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      max-width: 900px;
    }
    #viewer {
      width: 100%;
      height: 600px;
      border: 1px solid #ccc;
      border-radius: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>NIfTI Viewer</h1>

<input type="file" id="fileInput" />

<div id="viewer"></div>

<script src="https://unpkg.com/vtk.js/dist/vtk.js"></script>
<script src="https://unpkg.com/nifti-reader-js"></script>

<script>
  const container = document.getElementById("viewer");

  const renderWindow = vtk.Rendering.Core.vtkRenderWindow.newInstance();
  const renderer = vtk.Rendering.Core.vtkRenderer.newInstance();
  const openglRenderWindow = vtk.Rendering.OpenGL.vtkRenderWindow.newInstance();
  const interactor = vtk.Rendering.Core.vtkRenderWindowInteractor.newInstance();

  renderWindow.addRenderer(renderer);
  renderWindow.addView(openglRenderWindow);
  interactor.setView(openglRenderWindow);
  interactor.initialize();
  interactor.bindEvents(container);

  openglRenderWindow.setContainer(container);
  openglRenderWindow.setSize(container.clientWidth, container.clientHeight);

  document.getElementById("fileInput").addEventListener("change", async (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const arrayBuffer = await file.arrayBuffer();

    if (!nifti.isNIFTI(arrayBuffer)) {
      alert("Not a NIfTI file");
      return;
    }

    const header = nifti.readHeader(arrayBuffer);
    const image = nifti.readImage(header, arrayBuffer);

    const dims = header.dims.slice(1, 4);
    const spacing = header.pixDims.slice(1, 4);

    const dataArray = vtk.Common.Core.vtkDataArray.newInstance({
      numberOfComponents: 1,
      values: new Float32Array(image),
    });

    const imageData = vtk.Common.DataModel.vtkImageData.newInstance();
    imageData.setDimensions(...dims);
    imageData.setSpacing(...spacing);
    imageData.getPointData().setScalars(dataArray);

    const mapper = vtk.Rendering.Core.vtkVolumeMapper.newInstance();
    mapper.setInputData(imageData);

    const actor = vtk.Rendering.Core.vtkVolume.newInstance();
    actor.setMapper(mapper);

    renderer.removeAllViewProps();
    renderer.addVolume(actor);
    renderer.resetCamera();
    renderWindow.render();
  });
</script>

</body>
</html>
