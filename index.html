<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>3D / NIfTI Medical Viewer</title>

  <!-- Papaya viewer -->
  <script src="https://cdn.jsdelivr.net/npm/papaya-viewer@1.0.0/build/papaya.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/papaya-viewer@1.0.0/build/papaya.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      max-width: 1000px;
      line-height: 1.6;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    .section {
      margin-bottom: 30px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fafafa;
    }
    #papaya-container {
      width: 100%;
      height: 600px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>Online NIfTI / MRI / CT Viewer</h1>

<div class="section">
  <h2>Step 1 — Upload your 3D file</h2>
  <p>
    Supported formats: <b>.nii</b>, <b>.nii.gz</b>, <b>.mgh</b>, <b>.mgz</b>.
    Choose your file below and it will load in the viewer.
  </p>
  <input type="file" id="fileInput" />
</div>

<div class="section">
  <h2>Step 2 — View and explore</h2>
  <p>
    Use the built‑in Papaya controls to scroll through slices, change contrast, zoom, and switch views.
  </p>
  <div id="papaya-container" class="papaya"></div>
</div>

<script>
  // Wait for Papaya to initialize, then wire up the file input
  document.addEventListener("DOMContentLoaded", function () {
    const input = document.getElementById("fileInput");

    input.addEventListener("change", function (event) {
      const file = event.target.files[0];
      if (!file) return;

      // Load the selected file into the first Papaya viewer
      papaya.Container.resetViewer(0, [file]);
    });
  });
</script>

</body>
</html>
